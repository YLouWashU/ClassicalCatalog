<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>古典乐目录 — 留声机杂志精选</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Serif SC", "Source Han Serif SC", Georgia, serif;
      background: #f5f0eb;
      color: #1a1a1a;
      min-height: 100vh;
    }
    header {
      background: #1a0a0a;
      color: #f5f0eb;
      padding: 2rem 2rem 1.5rem;
    }
    header h1 {
      font-size: 2rem;
      letter-spacing: 0.05em;
      font-weight: normal;
    }
    header p {
      margin-top: 0.4rem;
      color: #c9a882;
      font-size: 0.95rem;
    }
    .lang-switch {
      float: right;
      font-size: 0.85rem;
      margin-top: 0.3rem;
    }
    .lang-switch a {
      color: #c9a882;
      text-decoration: none;
      border-bottom: 1px solid #c9a882;
    }
    main {
      max-width: 760px;
      margin: 2.5rem auto;
      padding: 0 1.5rem;
    }
    h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #7a5c3a;
      margin-bottom: 1rem;
      font-weight: normal;
    }
    .issue-list {
      list-style: none;
    }
    .issue-list li {
      border-bottom: 1px solid #ddd;
    }
    .issue-list a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      color: #1a0a0a;
      text-decoration: none;
      font-size: 1.1rem;
      transition: color 0.15s;
    }
    .issue-list a:hover {
      color: #8B0000;
    }
    .count {
      color: #999;
      font-size: 0.85rem;
      flex-shrink: 0;
      margin-left: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <span class="lang-switch"><a href="../en/index.html">English</a></span>
    <h1>古典乐目录</h1>
    <p>来自《留声机》杂志的精选录音推荐，附 Spotify 收听链接。</p>
  </header>
  <main>
    <h2>期刊列表</h2>
    <ul class="issue-list">
      
      <li>
        <a href="issues/2021-11/index.html">
          <span>Gramophone November 2021</span>
          <span class="count">16 张录音</span>
        </a>
      </li>
      
    </ul>
  </main>
</body>
</html>
